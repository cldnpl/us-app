# Production stack for usapi.islamov.online.
# Memory-tuned for a small server; Postgres has no public port (internal only);
# the API is exposed on 127.0.0.1:8090 for nginx to reverse-proxy.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: us
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: us
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=32MB"
      - "-c"
      - "max_connections=30"
      - "-c"
      - "effective_cache_size=96MB"
    volumes:
      - us-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    depends_on:
      - db
    environment:
      APP_ENV: production
      HTTP_PORT: "8080"
      DATABASE_URL: postgres://us:${POSTGRES_PASSWORD}@db:5432/us?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 720h
      APPLE_CLIENT_IDS: us.elbek.com
      APNS_TOPIC: us.elbek.com
      APNS_KEY_PATH: /app/secrets/AuthKey.p8
      APNS_KEY_ID: ${APNS_KEY_ID}
      APNS_TEAM_ID: ${APNS_TEAM_ID}
      APNS_PRODUCTION: "false"
      CORS_ALLOWED_ORIGINS: https://us.islamov.online
      MEDIA_DIR: /app/media-data
    volumes:
      - us-media:/app/media-data
      - ./AuthKey.p8:/app/secrets/AuthKey.p8:ro
    ports:
      - "127.0.0.1:8090:8080"
    restart: unless-stopped

volumes:
  us-pgdata:
  us-media:
