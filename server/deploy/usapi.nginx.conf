# nginx vhost for the Us. API. Proxies usapi.islamov.online -> the API container
# on 127.0.0.1:8090. TLS is added by certbot (`certbot --nginx -d usapi.islamov.online`)
# once the DNS A record points at this server.
server {
    listen 80;
    listen [::]:80;
    server_name usapi.islamov.online;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (for the future real-time /ws endpoint)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        client_max_body_size 25M;   # media uploads
        proxy_read_timeout 300s;
    }
}
