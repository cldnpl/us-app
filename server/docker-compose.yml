services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: us
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-us_dev_password}
      POSTGRES_DB: us
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U us -d us"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-dev}
      HTTP_PORT: "8080"
      DATABASE_URL: postgres://us:${POSTGRES_PASSWORD:-us_dev_password}@db:5432/us?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me_at_least_32_chars}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-720h}
      APPLE_CLIENT_IDS: ${APPLE_CLIENT_IDS:-us.elbek.com}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      MEDIA_DIR: /app/media-data
    volumes:
      - ./media-data:/app/media-data
    ports:
      - "8080:8080"
    restart: unless-stopped
