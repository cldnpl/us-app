name: Us
options:
  bundleIdPrefix: com.claudianapolitano
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "3"
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Automatic
targets:
  Us:
    type: application
    platform: iOS
    sources:
      - path: Us
      - path: Shared
    dependencies:
      - target: UsWidgetExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudianapolitano.us
        PRODUCT_NAME: Us
        DEVELOPMENT_TEAM: "H4M7KJL5DT"
        CODE_SIGN_ENTITLEMENTS: Us/Us.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Us/Info.plist
      properties:
        CFBundleDisplayName: "Us."
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "3"
        # Only standard HTTPS (ATS) crypto — skips the export-compliance
        # question on every TestFlight upload.
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocationWhenInUseUsageDescription: "Us uses your location to show how far apart you and your partner are and to power distance features and widgets. Sharing stays off until you turn it on, and you can stop anytime."
        NSPhotoLibraryUsageDescription: "Add photos to your shared gallery and send them to your partner's widget."
        NSCameraUsageDescription: "Snap a photo for Snap Hunt so your partner and the judge can see your find."
        NSHealthShareUsageDescription: "Us reads your cycle from Apple Health so you can see your current phase and predictions. It stays private on your phone until you choose to share a gentle heads-up with your partner."
        NSHealthUpdateUsageDescription: "Us can save period days you log in the app to Apple Health, so your cycle stays consistent across your health apps and devices."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - usapp

  UsWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: UsWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudianapolitano.us.widget
        PRODUCT_NAME: UsWidget
        DEVELOPMENT_TEAM: "H4M7KJL5DT"
        CODE_SIGN_ENTITLEMENTS: UsWidget/UsWidget.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
    info:
      path: UsWidget/Info.plist
      properties:
        CFBundleDisplayName: "Us."
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "3"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

schemes:
  Us:
    build:
      targets:
        Us: all
    run:
      config: Debug
      # Lets the paywall buy/restore in the simulator without App Store Connect.
      storeKitConfiguration: Products.storekit
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
