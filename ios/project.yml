name: Us
options:
  bundleIdPrefix: com.sharepact
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Automatic
targets:
  Us:
    type: application
    platform: iOS
    sources:
      - path: Us
      - path: Shared
    dependencies:
      - target: UsWidgetExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: us.elbek.com
        PRODUCT_NAME: Us
        DEVELOPMENT_TEAM: "988N3YY62P"
        CODE_SIGN_ENTITLEMENTS: Us/Us.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Us/Info.plist
      properties:
        CFBundleDisplayName: "Us."
        CFBundleIconName: AppIcon
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocationWhenInUseUsageDescription: "Us uses your location to show how far apart you and your partner are and to power distance features and widgets. Sharing stays off until you turn it on, and you can stop anytime."
        NSPhotoLibraryUsageDescription: "Add photos to your shared gallery and send them to your partner's widget."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - usapp

  UsWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: UsWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: us.elbek.com.widget
        PRODUCT_NAME: UsWidget
        DEVELOPMENT_TEAM: "988N3YY62P"
        CODE_SIGN_ENTITLEMENTS: UsWidget/UsWidget.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
    info:
      path: UsWidget/Info.plist
      properties:
        CFBundleDisplayName: "Us."
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

schemes:
  Us:
    build:
      targets:
        Us: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
